services:
  api:
    build: .
    # Bind only to localhost — Nginx reverse proxy handles external traffic.
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379

  redis:
    image: redis:7-alpine
    # No port exposure — only reachable from within the Docker network.
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  redis_data:
